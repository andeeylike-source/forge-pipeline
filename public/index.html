<body>

<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;

// ── CONFIG (all prompts) ──────────────────────────────────────
const DC={
character:{label:"Персонаж",icon:"🗡",
analysis:"You are an expert visual analyst. Analyze this game/fantasy character in extreme detail. Cover: species/race, height/build, posture/pose, limbs, non-human features (horns,tusks,claws,tails,wings), facial features, skin/hide/scales/fur texture, deformities/scars. EQUIPMENT: every armor piece, clothing, weapons, accessories. MATERIALS: skin texture, metals, leather, fabric, organic. COLORS: dominant, secondary. COMPOSITION: camera angle, framing. Be EXTREMELY specific. Return ONLY descriptive text.",
step1:"SUBJECT: {DESCRIPTION}\n\nABSOLUTE PHOTOGRAPHIC RECONSTRUCTION FROM GAME REFERENCE\n\nUse the uploaded image as absolute reference. Preserve exactly: character identity, anatomy, creature traits, pose, proportions, costume/armor/equipment, weapons, framing, silhouette. Do NOT redesign. Transform ONLY into real-world physical reality.\n\nIDENTITY LOCK: Preserve all elements. Do NOT beautify. Do NOT humanize non-human creatures.\n\nBIOLOGICAL RECONSTRUCTION: Believable organism. Pores, micro wrinkles, scars, dirt. No plastic. No CGI.\n\nMATERIALS: Metal=forged steel,scratches,wear. Leather=grain,creases. Fabric=real weave. Weapons=real metal,no glow.\n\nLIGHTING: Natural overcast. No fantasy glow.\nCAMERA: Full-frame, 85mm, natural DOF.\nGOAL: Real photograph. Zero game render.",
step2:"SUBJECT: {DESCRIPTION}\n\nExtremely realistic candid photo, imperfect everyday photography. Authentic biological surface: pores, wrinkles, scars, roughness, dirt, natural asymmetry. Shot on smartphone. Sensor noise, imperfect sharpness, lens distortion, chromatic aberration. Natural uncontrolled lighting. Neutral ungraded colors. RAW look.\n\nNEGATIVE: no beauty filter, no smoothing, no glamour lighting, no CGI clarity.",
step3:"SUBJECT: {DESCRIPTION}\n\nULTRA-PHOTOREALISTIC CINEMATIC FILM FRAME\n\nIdentity identical. Preserve anatomy, face, creature traits, armor, weapons.\n\nSCENE: Believable real-world environment.\nMATERIALS: Real physics. Metal scratches, leather grain, fabric weave.\nLIGHTING: Natural cinematic. Soft key. No fantasy glow.\nCAMERA: ARRI/RED, 50-85mm. Shallow DOF. Film grain.\nCOLOR: Cinematic grading. Film dynamic range.\nCOMPOSITION: 16:9, 3840x2160. Rule-of-thirds.\n\nNEGATIVE: cgi, game render, fantasy glow, cartoon, illustration, plastic.",
sizes:["1024x1024","1024x1024","1536x1024"]},

human:{label:"Человек",icon:"👤",
analysis:"Analyze this human portrait in extreme detail. Cover: gender, age, ethnicity, face shape, skin tone, hair, eyes, nose, lips, jaw, facial hair, imperfections, expression. BODY: build, posture. CLOTHING: every garment, accessories. LIGHTING: direction, quality. Be extremely specific about facial features. Return ONLY text.",
step1:"SUBJECT: {DESCRIPTION}\n\nABSOLUTE PHOTOGRAPHIC HUMAN REALIZATION\n\nPreserve exactly: facial identity, skull proportions, eye spacing, nose shape, lip structure, body proportions, pose, camera angle, framing.\n\nDo NOT redesign face. Do NOT beautify. Transform ONLY rendering into photographic realism.\n\nSkin: visible pores, micro-wrinkles, uneven pigmentation, capillary coloration, vellus hair, oil variation. Subsurface scattering. No plastic skin.\n\nClothing: real textile weave, gravity folds, wear.\nLighting: Natural. No fantasy glow.\nCamera: Full-frame, 85mm.\nGoal: Real photograph. Identity unchanged.",
step2:"SUBJECT: {DESCRIPTION}\n\nEXTREME REALISTIC HUMAN CANDID PHOTOGRAPH\n\nAccidental capture. Skin: deep pores, micro-wrinkles, uneven pigmentation, redness gradients, oil reflectivity, vellus hair, under-eye translucency, scars, freckles.\n\nSmartphone camera. Grain, noise, imperfect sharpness, lens distortion, chromatic aberration.\n\nNeutral ungraded colors. Imperfect white balance.\n\nNEGATIVE: beauty filter, studio lighting, glamour skin, perfect symmetry, CGI clarity.",
step3:"SUBJECT: {DESCRIPTION}\n\nULTRA-PHOTOREALISTIC CINEMATIC WALLPAPER\n\nAbsolute realism. Cinema camera. No fantasy glow. No CGI.\n\nSubject in believable environment. Natural proportions, real material interaction.\n\nAll surfaces: pores, fibers, scratches, wear, micro imperfections.\n\nLighting: Natural cinematic. Soft directional. No fantasy rim.\nCamera: 50-100mm. Shallow DOF. Film grain. RAW cinema still.\n4K: 16:9, 3840x2160. Rule-of-thirds.\n\nNEGATIVE: cgi, game render, cartoon, illustration, plastic skin, oversharpening, neon, bloom.",
sizes:["1024x1024","1024x1024","1536x1024"]},

location:{label:"Локация",icon:"🏰",
analysis:"Analyze this game/fantasy location in extreme detail. Cover: environment type, architectural style, materials, vegetation, water, lighting, atmosphere, scale, depth layers, color palette, mood. Every structure, pathway, texture detail, weathering. Be extremely specific. Return ONLY text.",
step1:"ENV: {DESCRIPTION}\n\nABSOLUTE PHOTOREALISTIC LIVE-ACTION LOCATION CONVERSION\n\nPreserve: layout, architecture, terrain, vegetation, framing, perspective exactly. Transform ONLY rendering.\n\nBuildings: real construction, weathering, erosion. Stone: geological fracture, moss. Ground: soil, gravel, paths. Vegetation: real density, damage.\n\nMaterials: Stone cracks, wood grain, brick mortar, metal oxidation.\nLighting: Natural. No HDR glow.\nCamera: ARRI/RED, 35mm, f/4.0.\nAtmosphere: Volumetric air, dust, haze.\nColor: Neutral cinematic. RAW realism.",
step2:"ENV: {DESCRIPTION}\n\nABSOLUTE PHOTOGRAPHIC REINTERPRETATION\n\nReconstruct as real photographed location. Architecture with real weight and material logic. Natural asymmetry. Stone with geological breakup, erosion. Ground with soil compaction. Vegetation as real botanical matter.\n\nNo CGI cleanliness. No synthetic repetition.\n\nLight: Natural overcast. DSLR, 35mm, f/4.0.\nColor: Neutral grading. RAW realism.",
step3:"ENV: {DESCRIPTION}\n\nExtremely realistic candid photo of a real location. Real stone texture, wood grain, cracked masonry, weathered paths, realistic vegetation. Smartphone camera, sensor noise, imperfect sharpness. Natural lighting. RAW look.\n\nNEGATIVE: No CGI, no synthetic symmetry, no repeated patterns, no artificial glow.",
step4:"ENV: {DESCRIPTION}\n\nULTRA-PHOTOREALISTIC CINEMATIC ENVIRONMENT WALLPAPER\n\nAbsolute realism. Cinema camera. Physically believable architecture/terrain. Real material detail: stone, wood, vegetation wear.\n\nLighting: Natural cinematic. Soft directional.\nCamera: 24-50mm. Film grain. RAW cinema still.\n4K: 16:9, 3840x2160. Rule-of-thirds.\n\nNEGATIVE: cgi, game render, fantasy glow, cartoon, oversharpening, repeated textures, plastic.",
sizes:["1024x1024","1024x1024","1024x1024","1536x1024"]},

object:{label:"Предмет",icon:"⚔",
analysis:"Analyze this game/fantasy object in extreme detail. Cover: type, shape, silhouette, dimensions, primary/secondary materials, surface finish, construction method, engravings, gems, wrapping, damage/wear, edge condition. Return ONLY text.",
step1:"OBJECT: {DESCRIPTION}\n\nABSOLUTE PHOTOGRAPHIC OBJECT RECONSTRUCTION\n\nPreserve: identity, shape, silhouette, proportions, construction, engravings, damage patterns exactly.\n\nIf metal: scratches, worn edges, oxidation. If wood: grain, cracks, aging. If leather: pores, creases, edge wear. If stone: erosion, chips.\n\nNeutral studio lighting. Full-frame, 50-85mm. Product photography.\nGoal: Real photographed object. Zero game render.",
step2:"OBJECT: {DESCRIPTION}\n\nULTRA-PHOTOREALISTIC CINEMATIC OBJECT FINALIZATION\n\nIdentity identical. Premium cinematic product shot.\n\nMaterials: Metal edge wear, scratches, oxidation. Wood grain. Leather pores. No CGI smoothness.\n\nLighting: Soft key, controlled shadows. Object must feel expensive and real.\nCamera: ARRI, 50-85mm. Shallow DOF. Film grain.\n\nFINAL: One image, 2x2 layout: front, side, back, 3/4 view. Same object, consistent scale/lighting/materials.\n\nNEGATIVE: cgi, illustration, fantasy glow, plastic, oversharpening, bloom.",
sizes:["1024x1024","1024x1024"]}
};

// ── API calls to our server proxy ─────────────────────────────
function lsGet(k){try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

async function apiCheck(key){
  var r=await fetch("/api/check",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({apiKey:key})});
  return r.json();
}
async function apiVision(key,prompt,b64){
  var r=await fetch("/api/vision",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({apiKey:key,prompt:prompt,imageBase64:b64})});
  if(!r.ok){var d=await r.json();throw new Error(d.error||"Vision error")}
  var d=await r.json();return d.text;
}
async function apiGenerate(key,prompt,b64,aspect){
  var r=await fetch("/api/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({apiKey:key,prompt:prompt,imageBase64:b64||null,aspectRatio:aspect||"1:1"})});
  if(!r.ok){var d=await r.json();throw new Error(d.error||"Generate error")}
  var d=await r.json();return d.imageUrl;
}

async function fileToB64(file){return new Promise(function(res){var r=new FileReader();r.onloadend=function(){res(r.result.split(",")[1])};r.readAsDataURL(file)})}
async function urlToB64(url){var r=await fetch(url);var b=await r.blob();return fileToB64(b)}
async function compress(file){
  if(file.size<800000)return file;
  return new Promise(function(res){var img=new Image();var u=URL.createObjectURL(file);
    img.onload=function(){URL.revokeObjectURL(u);var w=img.width,h=img.height;if(w>1024||h>1024){var s=1024/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s)}
    var c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);
    c.toBlob(function(b){res(new File([b],"i.png",{type:"image/png"}));},"image/png")};
    img.onerror=function(){URL.revokeObjectURL(u);res(file)};img.src=u})
}

// ── THEME ─────────────────────────────────────────────────────
var T={bg:"#07070a",sf:"#0c0c10",sf2:"#121216",sf3:"#1a1a20",bd:"#24242e",tx:"#d4d4dc",txM:"#6e6e7e",txD:"#44444e",ac:"#c49838",acD:"#8a6c28",err:"#b83030",ok:"#38a048",blu:"#3868b0"};
var fn="'IBM Plex Mono',monospace",fd="'Cormorant Garamond',Georgia,serif";
var subs={character:"Анализ → 1:1 → Реализм → 4K",human:"Анализ → 1:1 → Реализм → 4K",location:"Анализ → 1 → 2 → 3 → 4",object:"Анализ → 1:1 → 4-angle final"};

function App(){
  var [key,setKey]=useState(function(){return lsGet("fk")||""});
  var [cfg,setCfg]=useState(function(){return lsGet("fc")||DC});
  var [showK,setShowK]=useState(false);
  var [kStat,setKStat]=useState(null);
  var [kErr,setKErr]=useState("");
  var [img,setImg]=useState(null);
  var [run,setRun]=useState(false);
  var [pType,setPType]=useState(null);
  var [step,setStep]=useState(-1);
  var [ana,setAna]=useState("");
  var [results,setResults]=useState([]);
  var [err,setErr]=useState("");
  var [toast,setToast]=useState({m:"",s:false});
  var [debug,setDebug]=useState(false);
  var ab=useRef(null);

  useEffect(function(){if(key)lsSet("fk",key)},[key]);
  var flash=useCallback(function(m){setToast({m:m,s:true});setTimeout(function(){setToast({m:"",s:false})},2200)},[]);

  // Input
  var onPaste=useCallback(function(e){var items=e.clipboardData&&e.clipboardData.items;if(!items)return;
    for(var i=0;i<items.length;i++){if(items[i].type.indexOf("image/")===0){e.preventDefault();
      setImg(URL.createObjectURL(items[i].getAsFile()));setResults([]);setStep(-1);setErr("");setAna("");setPType(null);flash("OK");return}}},[flash]);
  var onDrop=useCallback(function(e){e.preventDefault();var f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];
    if(f&&f.type.indexOf("image/")===0){setImg(URL.createObjectURL(f));setResults([]);setStep(-1);setErr("");setAna("");setPType(null);flash("OK")}},[flash]);
  var onClickUp=useCallback(function(){var inp=document.createElement("input");inp.type="file";inp.accept="image/*";
    inp.onchange=function(e){var f=e.target.files[0];if(f){setImg(URL.createObjectURL(f));setResults([]);setStep(-1);setErr("");setAna("");setPType(null);flash("OK")}};inp.click()},[flash]);

  // Pipeline
  var getSteps=function(c){var s=[];if(c.step1)s.push({p:c.step1,sz:c.sizes[0]||"1024x1024"});if(c.step2)s.push({p:c.step2,sz:c.sizes[1]||"1024x1024"});
    if(c.step3)s.push({p:c.step3,sz:c.sizes[2]||"1024x1024"});if(c.step4)s.push({p:c.step4,sz:c.sizes[3]||"1536x1024"});return s};

  var runPipe=useCallback(async function(type){
    if(!img){flash("Вставьте изображение");return}if(!key){setShowK(true);return}
    var c=cfg[type];if(!c)return;var steps=getSteps(c);
    setRun(true);setPType(type);setErr("");setResults(steps.map(function(){return null}));setAna("");
    try{
      setStep(0);
      var raw=await fetch(img);var blob=await raw.blob();var compressed=await compress(blob);var b64=await fileToB64(compressed);
      var desc=await apiVision(key,c.analysis,b64);
      setAna(desc);
      var prevB64=b64;
      for(var i=0;i<steps.length;i++){
        setStep(i+1);
        var prompt=steps[i].p.replace("{DESCRIPTION}",desc);
        var aspect=({"1024x1024":"1:1","1536x1024":"3:2","1024x1536":"2:3"})[steps[i].sz]||"1:1";
        var imgUrl=await apiGenerate(key,prompt,prevB64,aspect);
        setResults(function(prev){var n=prev.slice();n[i]=imgUrl;return n});
        // Get base64 of result for next step
        if(i<steps.length-1){var r2=await fetch(imgUrl);var b2=await r2.blob();prevB64=await fileToB64(b2)}
      }
      setStep(-1);flash("Готово!");
    }catch(e){setErr(e.message)}finally{setRun(false)}
  },[img,key,cfg,flash]);

  var ac=pType&&cfg[pType];
  var total=ac?getSteps(ac).length:results.length||3;
  var final_=results[total-1];
  var hasAny=results.some(function(r){return r!==null});
  var labels=["Анализ"].concat(Array.from({length:total},function(_,i){return i===total-1?"Финал":"Шаг "+(i+1)}));

  // Render
  return React.createElement("div",{style:{background:T.bg,color:T.tx,minHeight:"100vh",fontFamily:fn,display:"flex",flexDirection:"column"},onPaste:onPaste,tabIndex:0},

    // Header
    React.createElement("header",{style:{background:T.sf,borderBottom:"1px solid "+T.bd,padding:"0 20px",height:44,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}},
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10}},
        React.createElement("span",{style:{fontFamily:fd,fontSize:20,fontWeight:700,color:T.ac}},"FORGE"),
        React.createElement("span",{style:{fontSize:8,color:T.txD,textTransform:"uppercase"}},"openrouter · gemini"),
        React.createElement("span",{style:{fontSize:8,color:key?(kStat==="ok"?T.ok:T.ac):T.err}},"● "+(key?(kStat==="ok"?"OK":"ключ"):"нет ключа"))
      ),
      React.createElement("button",{onClick:function(){setShowK(true)},style:{background:T.sf2,border:"1px solid "+T.bd,borderRadius:3,color:T.tx,fontFamily:fn,fontSize:10,padding:"4px 10px",cursor:"pointer"}},"🔑 API")
    ),

    React.createElement("div",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"24px 20px",overflow:"auto"}},

      // Input
      React.createElement("div",{onDragOver:function(e){e.preventDefault()},onDrop:onDrop,onClick:!img?onClickUp:undefined,
        style:{width:"100%",maxWidth:840,border:"2px dashed "+(img?T.ac:T.bd),borderRadius:8,background:img?"transparent":T.sf,padding:img?0:"36px 20px",textAlign:"center",cursor:img?"default":"pointer",marginBottom:20,overflow:"hidden"}},
        !img&&React.createElement("div",null,React.createElement("div",{style:{fontSize:36,marginBottom:6,opacity:.2}},"◈"),React.createElement("div",{style:{fontFamily:fn,fontSize:13,color:T.txM}},"Ctrl+V · Drop · Click")),
        img&&React.createElement("div",{style:{position:"relative"}},
          React.createElement("img",{src:img,style:{width:"100%",maxHeight:360,objectFit:"contain",display:"block",borderRadius:6}}),
          React.createElement("button",{onClick:function(e){e.stopPropagation();setImg(null);setResults([]);setAna("");setPType(null);setStep(-1)},
            style:{position:"absolute",top:8,right:8,background:T.sf,border:"1px solid "+T.bd,borderRadius:3,color:T.err,fontFamily:fn,fontSize:10,padding:"3px 8px",cursor:"pointer"}},"✕"))
      ),

      // 4 Buttons
      React.createElement("div",{style:{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap",justifyContent:"center"}},
        Object.entries(cfg).map(function(e){var type=e[0],c=e[1];
          return React.createElement("button",{key:type,disabled:!img||run,onClick:function(){runPipe(type)},
            style:{background:pType===type&&hasAny?T.acD:T.sf2,color:pType===type?T.ac:T.tx,border:"1px solid "+(pType===type?T.ac:T.bd),borderRadius:4,padding:"14px 28px",fontFamily:fn,fontSize:14,fontWeight:600,cursor:!img||run?"not-allowed":"pointer",opacity:!img?.25:run&&pType!==type?.3:1,transition:"all .15s"}},
            c.icon+" "+c.label)})
      ),

      // Progress
      run&&React.createElement("div",{style:{width:"100%",maxWidth:840,marginBottom:16}},
        React.createElement("div",{style:{display:"flex",gap:2}},
          Array.from({length:total+1},function(_,s){var done=s===0?ana.length>0:results[s-1]!==null;var active=step===s;
            return React.createElement("div",{key:s,style:{flex:1,height:3,background:T.sf3,borderRadius:2,overflow:"hidden"}},
              React.createElement("div",{style:{height:"100%",borderRadius:2,background:done?T.ok:active?T.ac:"transparent",width:done?"100%":active?"50%":"0%",transition:"width .6s",animation:active?"pulse 1.2s ease infinite":"none"}}))})
        ),
        React.createElement("div",{style:{fontFamily:fn,fontSize:10,color:T.ac,marginTop:6,textAlign:"center"}},
          React.createElement("span",{style:{display:"inline-block",width:12,height:12,border:"2px solid "+T.bd,borderTopColor:T.ac,borderRadius:"50%",animation:"spin .7s linear infinite",verticalAlign:"middle",marginRight:6}}),
          (labels[step]||"Обработка")+"...")
      ),

      // Error
      err&&React.createElement("div",{style:{width:"100%",maxWidth:840,color:T.err,fontFamily:fn,fontSize:11,marginBottom:16,padding:"10px 14px",background:T.err+"15",borderRadius:4}},"❌ "+err),

      // Final
      final_&&React.createElement("div",{style:{width:"100%",maxWidth:840,marginBottom:16}},
        React.createElement("div",{style:{background:T.sf,border:"2px solid "+T.ac,borderRadius:6,overflow:"hidden"}},
          React.createElement("img",{src:final_,style:{width:"100%",display:"block"}}),
          React.createElement("div",{style:{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:"1px solid "+T.bd}},
            React.createElement("div",null,
              React.createElement("div",{style:{fontFamily:fd,fontSize:18,color:T.ac,fontWeight:700}},(ac?ac.icon+" "+ac.label:"")+" — Финал"),
              React.createElement("div",{style:{fontFamily:fn,fontSize:9,color:T.txD,marginTop:2}},subs[pType]||labels.join(" → "))
            ),
            React.createElement("button",{onClick:function(){var a=document.createElement("a");a.href=final_;a.download="forge_final.png";a.click()},
              style:{background:T.ac,color:T.bg,border:"none",borderRadius:3,padding:"10px 20px",fontFamily:fn,fontSize:12,fontWeight:600,cursor:"pointer",textTransform:"uppercase"}},"↓ Скачать")
          ))
      ),

      // Debug
      (hasAny||ana)&&React.createElement("div",{style:{width:"100%",maxWidth:840}},
        React.createElement("div",{onClick:function(){setDebug(!debug)},style:{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"8px 0",marginBottom:8}},
          React.createElement("span",{style:{fontFamily:fn,fontSize:10,color:T.txD,textTransform:"uppercase"}},(debug?"▾":"▸")+" Детали")),
        debug&&React.createElement("div",null,
          ana&&React.createElement("div",{style:{background:T.sf,border:"1px solid "+T.blu,borderRadius:4,padding:"10px 12px",marginBottom:12}},
            React.createElement("div",{style:{fontFamily:fn,fontSize:9,color:T.blu,fontWeight:600,marginBottom:6}},"GEMINI АНАЛИЗ"),
            React.createElement("pre",{style:{fontFamily:fn,fontSize:10,color:T.tx,lineHeight:1.7,margin:0,whiteSpace:"pre-wrap",wordBreak:"break-word",maxHeight:200,overflow:"auto"}},ana)),
          React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat("+Math.min(total,4)+",1fr)",gap:6,marginBottom:12}},
            results.map(function(im,idx){return React.createElement("div",{key:idx,style:{background:T.sf,border:"1px solid "+(im?T.bd:T.sf3),borderRadius:4,overflow:"hidden",opacity:im?1:.3}},
              im?React.createElement("img",{src:im,style:{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block"}}):React.createElement("div",{style:{width:"100%",aspectRatio:"1",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:fn,fontSize:10,color:T.txD}},"—"),
              React.createElement("div",{style:{padding:"3px 6px",fontFamily:fn,fontSize:8,color:im?T.ok:T.txD,borderTop:"1px solid "+T.bd}},labels[idx+1]||"Шаг "+(idx+1)))})
          ),
          React.createElement("div",{style:{display:"flex",gap:4,flexWrap:"wrap"}},
            results.map(function(im,idx){if(!im)return null;return React.createElement("button",{key:idx,onClick:function(){var a=document.createElement("a");a.href=im;a.download="forge_step"+(idx+1)+".png";a.click()},
              style:{background:T.sf2,color:T.txM,border:"1px solid "+T.bd,borderRadius:3,padding:"4px 8px",fontFamily:fn,fontSize:9,cursor:"pointer"}},"↓ "+(labels[idx+1]||"Шаг "+(idx+1)))}))
        )
      ),

      // Empty
      !img&&!hasAny&&React.createElement("div",{style:{marginTop:48,textAlign:"center"}},
        React.createElement("div",{style:{fontFamily:fd,fontSize:22,color:T.txD,marginBottom:10}},"Вставьте изображение"),
        React.createElement("div",{style:{fontFamily:fn,fontSize:11,color:T.txD,lineHeight:2}},"Ctrl+V · Drag & Drop · Click"))
    ),

    // Key modal
    showK&&React.createElement("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",zIndex:2000,display:"flex",justifyContent:"center",alignItems:"center"},onClick:function(){setShowK(false)}},
      React.createElement("div",{onClick:function(e){e.stopPropagation()},style:{background:T.sf,border:"1px solid "+T.bd,borderRadius:6,width:420,padding:24}},
        React.createElement("h3",{style:{fontFamily:fd,fontSize:18,color:T.ac,margin:"0 0 14px"}},"OpenRouter API Key (Gemini)"),

        React.createElement("div",{style:{display:"flex",gap:8}},
